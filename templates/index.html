<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yollo AI — Video Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #0a0a0b;
  --panel:   #111113;
  --border:  #222226;
  --border2: #2e2e35;
  --accent:  #e8ff47;
  --accent2: #47c5ff;
  --muted:   #44444f;
  --text:    #d4d4e0;
  --text2:   #7a7a8c;
  --success: #3dff9a;
  --error:   #ff4d6b;
  --warn:    #ffb347;
  --radius:  6px;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'Syne', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--sans);height:100vh;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
}

/* HEADER */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;border-bottom:1px solid var(--border);
  background:rgba(10,10,11,.92);backdrop-filter:blur(12px);
  position:relative;z-index:100;height:54px;flex-shrink:0;
}
.logo{font-family:var(--sans);font-weight:800;font-size:1rem;letter-spacing:.04em;display:flex;align-items:center;gap:9px;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 9px var(--accent);animation:pulse-dot 2s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.75);}}
.header-stats{display:flex;gap:14px;align-items:center;font-family:var(--mono);font-size:.7rem;color:var(--text2);}
.stat-badge{display:flex;align-items:center;gap:5px;padding:3px 9px;border:1px solid var(--border2);border-radius:20px;}
.dot{width:6px;height:6px;border-radius:50%;}
.dot-green{background:var(--success);box-shadow:0 0 5px var(--success);}
.dot-yellow{background:var(--warn);box-shadow:0 0 5px var(--warn);}
.dot-blue{background:var(--accent2);box-shadow:0 0 5px var(--accent2);}

/* ROOT LAYOUT */
.app{
  display:grid;
  grid-template-columns:360px 1fr;
  height:calc(100vh - 54px);
  position:relative;z-index:1;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;overflow:hidden;}
.form-panel{padding:18px;border-bottom:1px solid var(--border);flex:0 0 auto;overflow-y:auto;max-height:65%;}
.form-panel::-webkit-scrollbar{width:2px;}
.form-panel::-webkit-scrollbar-thumb{background:var(--border2);}
.section-title{
  font-family:var(--mono);font-size:.62rem;color:var(--text2);
  letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border2);}

.drop-zone{
  border:1.5px dashed var(--border2);border-radius:var(--radius);
  padding:20px;text-align:center;cursor:pointer;transition:all .2s;
  position:relative;overflow:hidden;background:rgba(255,255,255,.015);
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(232,255,71,.04);}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.drop-icon{font-size:1.6rem;margin-bottom:6px;}
.drop-text{font-family:var(--mono);font-size:.72rem;color:var(--text2);}
.drop-text strong{color:var(--accent);font-weight:500;}
.image-preview{width:100%;max-height:130px;object-fit:contain;border-radius:4px;display:none;}

label{display:block;font-family:var(--mono);font-size:.67rem;color:var(--text2);letter-spacing:.06em;margin-bottom:5px;margin-top:12px;}
textarea,select{
  width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border2);
  border-radius:var(--radius);color:var(--text);font-family:var(--mono);font-size:.78rem;
  padding:8px 11px;outline:none;transition:border-color .2s;resize:none;
}
textarea:focus,select:focus{border-color:var(--accent);}
select option{background:var(--panel);}

.pill-group{display:flex;gap:5px;flex-wrap:wrap;}
.pill{padding:4px 11px;border:1px solid var(--border2);border-radius:20px;font-family:var(--mono);font-size:.7rem;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;}
.pill:hover{border-color:var(--accent2);color:var(--accent2);}
.pill.active{border-color:var(--accent2);background:rgba(71,197,255,.12);color:var(--accent2);}

.slider-group{display:flex;align-items:center;gap:10px;}
input[type=range]{flex:1;height:4px;-webkit-appearance:none;background:var(--border2);border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:var(--accent);border-radius:50%;box-shadow:0 0 7px var(--accent);}
.slider-val{font-family:var(--mono);font-size:.82rem;color:var(--accent);font-weight:700;min-width:26px;text-align:right;}

.btn-start{
  width:100%;margin-top:14px;padding:12px;background:var(--accent);color:#0a0a0b;
  border:none;border-radius:var(--radius);font-family:var(--sans);font-weight:700;font-size:.88rem;
  letter-spacing:.04em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;
}
.btn-start:hover{background:#f5ff80;transform:translateY(-1px);box-shadow:0 4px 18px rgba(232,255,71,.28);}
.btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none;}

.jobs-panel{flex:1;overflow-y:auto;padding:14px;}
.jobs-panel::-webkit-scrollbar{width:2px;}
.jobs-panel::-webkit-scrollbar-thumb{background:var(--border2);}

.job-card{border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.job-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--muted);transition:background .2s;}
.job-card.active,.job-card:hover{border-color:var(--border2);}
.job-card.active{background:rgba(255,255,255,.02);}
.job-card.status-running::before{background:var(--accent2);box-shadow:0 0 7px var(--accent2);}
.job-card.status-polling::before{background:var(--warn);box-shadow:0 0 7px var(--warn);}
.job-card.status-done::before{background:var(--success);box-shadow:0 0 7px var(--success);}
.job-card.status-failed::before,.job-card.status-cancelled::before{background:var(--error);}
.job-card.status-failed,.job-card.status-cancelled{opacity:.6;}
.job-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.job-prompt{font-family:var(--mono);font-size:.7rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;}
.job-status-badge{font-family:var(--mono);font-size:.6rem;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.badge-queued{background:rgba(122,122,140,.15);color:var(--text2);}
.badge-running{background:rgba(71,197,255,.12);color:var(--accent2);}
.badge-polling{background:rgba(255,179,71,.12);color:var(--warn);}
.badge-done{background:rgba(61,255,154,.1);color:var(--success);}
.badge-failed{background:rgba(255,77,107,.1);color:var(--error);}
.badge-cancelled{background:rgba(122,122,140,.1);color:var(--text2);}
.job-meta{margin-top:5px;font-family:var(--mono);font-size:.62rem;color:var(--text2);display:flex;gap:8px;}
.job-actions{display:flex;gap:5px;margin-top:7px;}
.btn-sm{padding:3px 9px;font-family:var(--mono);font-size:.63rem;border-radius:3px;cursor:pointer;border:1px solid;transition:all .15s;background:transparent;}
.btn-cancel{border-color:var(--error);color:var(--error);}
.btn-cancel:hover{background:rgba(255,77,107,.1);}
.btn-del{border-color:var(--muted);color:var(--text2);}
.btn-del:hover{border-color:var(--error);color:var(--error);}
.btn-copy{border-color:var(--success);color:var(--success);}
.btn-copy:hover{background:rgba(61,255,154,.1);}

/* MAIN RIGHT */
.main-area{display:flex;flex-direction:column;height:100%;overflow:hidden;}

/* VIDEO SECTION */
.video-section{flex-shrink:0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;background:#0c0c0e;}
.video-section.hidden{display:none;}
.video-wrapper{background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.video-wrapper video{max-width:100%;max-height:210px;display:block;object-fit:contain;background:#000;}
.video-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;padding:26px;color:var(--muted);font-family:var(--mono);font-size:.72rem;opacity:.4;}
.video-placeholder-icon{font-size:1.8rem;}

/* CONTROLS */
.video-controls{padding:8px 14px 10px;display:flex;flex-direction:column;gap:7px;border-top:1px solid var(--border);}

/* SCRUBBER */
.scrubber-row{display:flex;align-items:center;gap:9px;}
.scrubber-wrap{flex:1;position:relative;height:24px;cursor:pointer;user-select:none;}
.scrubber-track{position:absolute;top:50%;transform:translateY(-50%);left:0;right:0;height:5px;background:var(--border2);border-radius:3px;}
.scrubber-fill{height:100%;background:var(--accent2);width:0%;border-radius:3px;transition:width .04s linear;}
.scrubber-thumb{
  position:absolute;top:50%;width:14px;height:14px;
  background:var(--accent2);border-radius:50%;
  transform:translate(-50%,-50%);left:0%;
  box-shadow:0 0 8px var(--accent2);pointer-events:none;
  transition:width .1s,height .1s;
}
.scrubber-wrap:hover .scrubber-thumb{width:18px;height:18px;}
.scrubber-wrap:active .scrubber-thumb{width:20px;height:20px;box-shadow:0 0 14px var(--accent2);}
.scrubber-tooltip{
  position:absolute;bottom:26px;background:rgba(10,10,11,.97);
  border:1px solid var(--accent2);border-radius:4px;padding:3px 8px;
  font-family:var(--mono);font-size:.65rem;color:var(--accent2);
  pointer-events:none;transform:translateX(-50%);white-space:nowrap;display:none;z-index:10;
}
.scrubber-wrap:hover .scrubber-tooltip{display:block;}
.time-display{font-family:var(--mono);font-size:.68rem;color:var(--text2);white-space:nowrap;min-width:90px;text-align:right;}

/* CONTROL BUTTONS */
.ctrl-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.btn-ctrl{
  background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--text2);
  padding:4px 10px;border-radius:4px;font-family:var(--mono);font-size:.67rem;
  cursor:pointer;transition:all .12s;white-space:nowrap;
}
.btn-ctrl:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(71,197,255,.06);}
.btn-ctrl.accent{border-color:var(--accent);color:var(--accent);}
.btn-ctrl.accent:hover{background:rgba(232,255,71,.07);}
.btn-ctrl.green{border-color:var(--success);color:var(--success);}
.btn-ctrl.green:hover{background:rgba(61,255,154,.07);}
.btn-ctrl:disabled{opacity:.25;cursor:default;pointer-events:none;}
.ctrl-sep{width:1px;height:14px;background:var(--border2);flex-shrink:0;margin:0 2px;}

/* FRAME EXTRACT ROW */
.frame-row{display:none;align-items:center;gap:10px;padding-top:8px;border-top:1px solid var(--border);}
.frame-row.visible{display:flex;}
.frame-thumb{width:62px;height:44px;object-fit:contain;border:1px solid var(--border2);border-radius:3px;background:#000;flex-shrink:0;}
.frame-info{flex:1;font-family:var(--mono);font-size:.66rem;}
.frame-ts{color:var(--accent);font-weight:700;}
.frame-sz{color:var(--text2);margin-top:2px;}
.btn-use-frame{
  padding:7px 13px;background:var(--accent);color:#0a0a0b;border:none;border-radius:4px;
  font-family:var(--sans);font-weight:700;font-size:.74rem;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.btn-use-frame:hover{background:#f5ff80;transform:translateY(-1px);}
#extractCanvas{display:none;}

/* LOG */
.log-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.log-title{font-family:var(--mono);font-size:.68rem;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.log-id{color:var(--accent);font-size:.65rem;}
.log-controls{display:flex;gap:8px;align-items:center;}
.btn-icon{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:4px 9px;border-radius:var(--radius);font-family:var(--mono);font-size:.63rem;cursor:pointer;transition:all .15s;}
.btn-icon:hover{border-color:var(--text2);color:var(--text);}
.log-terminal{flex:1;min-height:0;overflow-y:auto;padding:14px 20px;font-family:var(--mono);font-size:.73rem;line-height:1.7;}
.log-terminal::-webkit-scrollbar{width:3px;}
.log-terminal::-webkit-scrollbar-thumb{background:var(--border2);}
.log-entry{display:flex;gap:10px;padding:1px 0;animation:fadeIn .12s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-3px);}to{opacity:1;}}
.log-ts{color:var(--muted);min-width:78px;flex-shrink:0;}
.log-level{min-width:54px;flex-shrink:0;font-weight:500;}
.log-msg{color:var(--text);word-break:break-all;}
.log-info .log-level{color:var(--accent2);}
.log-success .log-level{color:var(--success);}
.log-error .log-level{color:var(--error);}
.log-warn .log-level{color:var(--warn);}
.log-muted .log-level,.log-muted .log-msg{color:var(--muted);}
.log-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:10px;font-family:var(--mono);font-size:.78rem;}
.empty-icon{font-size:2.4rem;opacity:.2;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}

/* MOBILE */
@media(max-width:768px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  .sidebar{max-height:50vh;border-right:none;border-bottom:1px solid var(--border);}
  .header-stats{display:none;}
}

/* MISC */
.spinner{display:inline-block;width:9px;height:9px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast-container{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:7px;z-index:999;}
.toast{background:var(--panel);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 15px;font-family:var(--mono);font-size:.73rem;color:var(--text);animation:toastIn .2s ease;min-width:220px;transition:opacity .4s;}
@keyframes toastIn{from{opacity:0;transform:translateY(7px);}to{opacity:1;}}
.toast.success{border-color:rgba(61,255,154,.3);}
.toast.error{border-color:rgba(255,77,107,.3);}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>YOLLO — AI VIDEO STUDIO</div>
  <div class="header-stats">
    <div class="stat-badge"><div class="dot dot-blue"></div><span id="cnt-running">0</span> çalışıyor</div>
    <div class="stat-badge"><div class="dot dot-green"></div><span id="cnt-done">0</span> tamamlandı</div>
    <div class="stat-badge"><div class="dot dot-yellow"></div><span id="cnt-total">0</span> toplam</div>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="form-panel">
      <div class="section-title">Yeni Video İşi</div>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="imageInput" accept="image/*"/>
        <img class="image-preview" id="imagePreview" alt="preview"/>
        <div id="dropContent">
          <div class="drop-icon">🖼️</div>
          <div class="drop-text">Görsel sürükle veya <strong>tıkla</strong></div>
          <div class="drop-text" style="margin-top:3px;font-size:.63rem;">JPG · PNG · WEBP</div>
        </div>
      </div>

      <label>PROMPT (opsiyonel)</label>
      <textarea id="promptInput" rows="3" placeholder="Kamera yavaşça yaklaşıyor, yumuşak gün ışığı..."></textarea>

      <label>VİDEO SÜRESİ</label>
      <div class="pill-group" id="lengthGroup">
        <div class="pill active" data-val="5">5s</div>
        <div class="pill" data-val="8">8s</div>
        <div class="pill" data-val="10">10s</div>
      </div>

      <label>ÇÖZÜNÜRLÜK</label>
      <div class="pill-group" id="resGroup">
        <div class="pill active" data-val="480p">480p</div>
        <div class="pill" data-val="720p">720p</div>
      </div>

      <label>PROXY THREAD SAYISI</label>
      <div class="slider-group">
        <input type="range" id="threadSlider" min="5" max="100" value="30" step="5"/>
        <span class="slider-val" id="threadVal">30</span>
      </div>

      <button class="btn-start" id="startBtn" onclick="startJob()">
        <span>▶ VİDEO ÜRETİMİNİ BAŞLAT</span>
      </button>
    </div>

    <div class="jobs-panel">
      <div class="section-title" style="margin-bottom:10px;">İşler</div>
      <div id="jobsList">
        <div style="font-family:var(--mono);font-size:.7rem;color:var(--muted);text-align:center;padding:18px 0;">Henüz iş yok</div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-area">

    <!-- VIDEO PLAYER -->
    <div class="video-section hidden" id="videoSection">
      <div class="video-wrapper" id="videoWrapper">
        <div class="video-placeholder" id="videoPlaceholder">
          <div class="video-placeholder-icon">🎬</div>
          <div>Video bekleniyor...</div>
        </div>
        <video id="videoEl" crossorigin="anonymous" playsinline preload="auto" loop style="display:none;"></video>
      </div>

      <div class="video-controls">
        <!-- Scrubber -->
        <div class="scrubber-row">
          <div class="scrubber-wrap" id="scrubberWrap">
            <div class="scrubber-track">
              <div class="scrubber-fill" id="scrubberFill"></div>
            </div>
            <div class="scrubber-thumb" id="scrubberThumb"></div>
            <div class="scrubber-tooltip" id="scrubberTooltip">0.000s</div>
          </div>
          <div class="time-display" id="timeDisplay">0.000s / 0.000s</div>
        </div>

        <!-- Playback buttons -->
        <div class="ctrl-row">
          <button class="btn-ctrl" id="btnPlayPause" onclick="togglePlay()">▶ Oynat</button>
          <div class="ctrl-sep"></div>
          <button class="btn-ctrl" onclick="stepFrame(-1)">◀◀ -1f</button>
          <button class="btn-ctrl" onclick="stepFrame(+1)">+1f ▶▶</button>
          <button class="btn-ctrl" onclick="stepSec(-0.1)">-0.1s</button>
          <button class="btn-ctrl" onclick="stepSec(+0.1)">+0.1s</button>
          <button class="btn-ctrl" onclick="stepSec(-1)">-1s</button>
          <button class="btn-ctrl" onclick="stepSec(+1)">+1s</button>
          <div class="ctrl-sep"></div>
          <button class="btn-ctrl" onclick="gotoStart()">|◀</button>
          <button class="btn-ctrl" onclick="gotoEnd()">▶|</button>
          <div class="ctrl-sep"></div>
          <button class="btn-ctrl accent" onclick="extractFrame()">📷 Frame Al</button>
          <button class="btn-ctrl green" onclick="extractLastFrame()">⏭ Son Frame</button>
        </div>

        <!-- Extracted frame preview -->
        <div class="frame-row" id="frameRow">
          <img class="frame-thumb" id="frameThumb" alt="frame"/>
          <div class="frame-info">
            <div class="frame-ts" id="frameTs">—</div>
            <div class="frame-sz" id="frameSz">—</div>
          </div>
          <button class="btn-use-frame" onclick="useExtractedFrame()">→ Yeni İş İçin Kullan</button>
        </div>
      </div>
    </div>

    <!-- LOG -->
    <div class="log-header">
      <div class="log-title">
        LOG ÇIKTISI
        <span class="log-id" id="activeJobLabel">— iş seçilmedi</span>
      </div>
      <div class="log-controls">
        <button class="btn-icon" onclick="clearLogs()">Temizle</button>
        <button class="btn-icon" onclick="toggleAutoScroll()" id="autoScrollBtn">↓ Oto-kaydır</button>
        <button class="btn-icon" onclick="copyLogs()">Kopyala</button>
      </div>
    </div>

    <div id="logContainer" class="log-terminal">
      <div class="log-empty" id="emptyState">
        <div class="empty-icon">⚙️</div>
        <div>Bir iş seçin veya başlatın</div>
        <div style="font-size:.68rem;color:var(--muted);margin-top:3px;">Loglar buraya akacak</div>
      </div>
    </div>

  </main>
</div>

<canvas id="extractCanvas"></canvas>
<div class="toast-container" id="toastContainer"></div>

<script>
// ── SOCKET ────────────────────────────────────────────────────────────────────
const socket       = io();
let activeJobId    = null;
let autoScroll     = true;
let allJobs        = {};
let subscribedJobs = new Set();

socket.on("connect",     () => {});
socket.on("jobs_update", jobs => renderJobList(jobs));
socket.on("log", data => {
  if (data.job_id in allJobs) {
    allJobs[data.job_id].logs = allJobs[data.job_id].logs || [];
    allJobs[data.job_id].logs.push(data);
  }
  if (data.job_id === activeJobId) appendLog(data);
});
socket.on("status", data => {
  if (allJobs[data.job_id]) Object.assign(allJobs[data.job_id], data);
  if (data.job_id === activeJobId && data.result_url) loadVideo(data.result_url);
  if (data.job_id === activeJobId) renderJobList(Object.values(allJobs));
  updateHeader();
});

// ── FORM ──────────────────────────────────────────────────────────────────────
let selectedFile   = null;
let selectedLength = "5";
let selectedRes    = "480p";

const dropZone    = document.getElementById("dropZone");
const imageInput  = document.getElementById("imageInput");
const preview     = document.getElementById("imagePreview");
const dropContent = document.getElementById("dropContent");

imageInput.addEventListener("change", e => handleFile(e.target.files[0]));
dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("drag-over"); handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file || !file.type.startsWith("image/")) return;
  selectedFile        = file;
  preview.src         = URL.createObjectURL(file);
  preview.style.display    = "block";
  dropContent.style.display = "none";
  dropZone.style.padding   = "6px";
}

document.querySelectorAll("#lengthGroup .pill").forEach(p => {
  p.onclick = () => {
    document.querySelectorAll("#lengthGroup .pill").forEach(x => x.classList.remove("active"));
    p.classList.add("active");
    selectedLength = p.dataset.val;
  };
});
document.querySelectorAll("#resGroup .pill").forEach(p => {
  p.onclick = () => {
    document.querySelectorAll("#resGroup .pill").forEach(x => x.classList.remove("active"));
    p.classList.add("active");
    selectedRes = p.dataset.val;
  };
});

const slider    = document.getElementById("threadSlider");
const sliderVal = document.getElementById("threadVal");
slider.oninput  = () => sliderVal.textContent = slider.value;

// ── START JOB ─────────────────────────────────────────────────────────────────
async function startJob() {
  if (!selectedFile) { toast("Önce bir görsel seçin!", "error"); return; }
  const btn = document.getElementById("startBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Başlatılıyor...';
  const fd = new FormData();
  fd.append("image",       selectedFile);
  fd.append("prompt",      document.getElementById("promptInput").value);
  fd.append("resolution",  selectedRes);
  fd.append("length",      selectedLength);
  fd.append("max_workers", slider.value);
  try {
    const r = await fetch("/api/start", { method: "POST", body: fd });
    const d = await r.json();
    if (d.error) { toast(d.error, "error"); return; }
    const jid = d.job_id;
    allJobs[jid] = {
      id: jid, status: "queued", logs: [],
      prompt: document.getElementById("promptInput").value || "(yok)",
      image_name: selectedFile.name,
      created_at: new Date().toLocaleTimeString("tr-TR"),
    };
    subscribeJob(jid);
    setActiveJob(jid);
    toast("İş başlatıldı: " + jid.slice(0, 8) + "...", "success");
  } catch(e) { toast("Hata: " + e.message, "error"); }
  finally { btn.disabled = false; btn.innerHTML = '▶ VİDEO ÜRETİMİNİ BAŞLAT'; }
}

function subscribeJob(jid) {
  if (subscribedJobs.has(jid)) return;
  subscribedJobs.add(jid);
  socket.emit("subscribe", { job_id: jid });
}

// ── ACTIVE JOB ────────────────────────────────────────────────────────────────
function setActiveJob(jid) {
  activeJobId = jid;
  document.getElementById("activeJobLabel").textContent = "— " + jid.slice(0, 8);
  document.getElementById("emptyState").style.display = "none";

  const container = document.getElementById("logContainer");
  container.querySelectorAll(".log-entry").forEach(e => e.remove());

  const job = allJobs[jid];
  if (job && job.logs) {
    job.logs.forEach(l => appendLog(l, false));
    if (autoScroll) container.scrollTop = container.scrollHeight;
  }

  if (job && job.result_url) loadVideo(job.result_url);
  else { document.getElementById("videoSection").classList.add("hidden"); stopVideo(); }

  document.querySelectorAll(".job-card").forEach(c => c.classList.toggle("active", c.dataset.jid === jid));
}

// ── LOGGING ───────────────────────────────────────────────────────────────────
function appendLog(data, doScroll=true) {
  const container = document.getElementById("logContainer");
  document.getElementById("emptyState").style.display = "none";
  const div = document.createElement("div");
  div.className = `log-entry log-${data.level}`;
  const labels = { info:"INFO ", success:"OK   ", error:"ERROR", warn:"WARN ", muted:".... " };
  div.innerHTML = `<span class="log-ts">${esc(data.ts)}</span><span class="log-level">${labels[data.level]||data.level}</span><span class="log-msg">${esc(data.msg)}</span>`;
  container.appendChild(div);
  if (autoScroll && doScroll) container.scrollTop = container.scrollHeight;
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function clearLogs(){ document.getElementById("logContainer").querySelectorAll(".log-entry").forEach(e=>e.remove()); if(activeJobId&&allJobs[activeJobId])allJobs[activeJobId].logs=[]; }
function toggleAutoScroll(){ autoScroll=!autoScroll; document.getElementById("autoScrollBtn").textContent=autoScroll?"↓ Oto-kaydır":"⏸ Durduruldu"; }
function copyLogs(){ const lines=[]; document.querySelectorAll(".log-entry").forEach(e=>{lines.push([...e.querySelectorAll("span")].map(s=>s.textContent).join(" | "));}); navigator.clipboard.writeText(lines.join("\n")); toast("Loglar kopyalandı","success"); }

// ── JOBS LIST ─────────────────────────────────────────────────────────────────
function renderJobList(jobs) {
  jobs.forEach(j => { allJobs[j.id] = {...(allJobs[j.id]||{}), ...j}; subscribeJob(j.id); });
  const c = document.getElementById("jobsList");
  if (!jobs.length) {
    c.innerHTML = '<div style="font-family:var(--mono);font-size:.7rem;color:var(--muted);text-align:center;padding:18px 0;">Henüz iş yok</div>';
    updateHeader(); return;
  }
  c.innerHTML = jobs.map(j => `
    <div class="job-card status-${j.status}${activeJobId===j.id?' active':''}" data-jid="${j.id}" onclick="setActiveJob('${j.id}')">
      <div class="job-card-top">
        <span class="job-prompt" title="${esc(j.prompt||'')}">${esc(j.prompt||'(prompt yok)')}</span>
        <span class="job-status-badge badge-${j.status}">${statusLabel(j.status)}</span>
      </div>
      <div class="job-meta"><span>🖼 ${esc(j.image_name)}</span><span>⏰ ${j.created_at}</span></div>
      <div class="job-actions" onclick="event.stopPropagation()">
        ${['running','polling','queued'].includes(j.status)?`<button class="btn-sm btn-cancel" onclick="cancelJob('${j.id}')">İptal</button>`:''}
        ${j.result_url?`<button class="btn-sm btn-copy" onclick="copyUrl('${esc(j.result_url)}')">URL Kopyala</button>`:''}
        <button class="btn-sm btn-del" onclick="deleteJob('${j.id}')">Sil</button>
      </div>
    </div>`).join("");
  updateHeader();
}
function statusLabel(s){ return {queued:"Sırada",running:"Çalışıyor",polling:"Bekliyor",done:"Tamamlandı",failed:"Hata",cancelled:"İptal"}[s]||s; }
async function cancelJob(jid){ await fetch(`/api/job/${jid}/cancel`,{method:"POST"}); toast("İptal isteği gönderildi"); }
async function deleteJob(jid){
  await fetch(`/api/job/${jid}/delete`,{method:"DELETE"});
  delete allJobs[jid];
  if(activeJobId===jid){
    activeJobId=null;
    document.getElementById("activeJobLabel").textContent="— iş seçilmedi";
    document.getElementById("emptyState").style.display="flex";
    document.getElementById("videoSection").classList.add("hidden");
    stopVideo();
    document.getElementById("logContainer").querySelectorAll(".log-entry").forEach(e=>e.remove());
  }
}
function copyUrl(url){ navigator.clipboard.writeText(url); toast("URL kopyalandı!","success"); }
function updateHeader(){
  const v = Object.values(allJobs);
  document.getElementById("cnt-running").textContent = v.filter(j=>j.status==="running"||j.status==="polling").length;
  document.getElementById("cnt-done").textContent    = v.filter(j=>j.status==="done").length;
  document.getElementById("cnt-total").textContent   = v.length;
}

// ── VIDEO PLAYER ──────────────────────────────────────────────────────────────
const vid       = document.getElementById("videoEl");
const vsection  = document.getElementById("videoSection");
const fill      = document.getElementById("scrubberFill");
const thumb     = document.getElementById("scrubberThumb");
const tooltip   = document.getElementById("scrubberTooltip");
const timeDisp  = document.getElementById("timeDisplay");
const btnPP     = document.getElementById("btnPlayPause");
const scrubWrap = document.getElementById("scrubberWrap");

let scrubDragging = false;
let extractedBlob = null;

function fmt(t){ return isFinite(t) ? t.toFixed(3)+"s" : "—"; }

function updateScrubber(){
  if (!vid.duration) return;
  const pct = (vid.currentTime / vid.duration) * 100;
  fill.style.width  = pct + "%";
  thumb.style.left  = pct + "%";
  timeDisp.textContent = fmt(vid.currentTime) + " / " + fmt(vid.duration);
}

vid.addEventListener("timeupdate",     updateScrubber);
vid.addEventListener("loadedmetadata", updateScrubber);
vid.addEventListener("seeked",         updateScrubber);
vid.addEventListener("play",  () => { btnPP.textContent="⏸ Duraklat"; btnPP.classList.add("accent"); });
vid.addEventListener("pause", () => { btnPP.textContent="▶ Oynat"; btnPP.classList.remove("accent"); });
vid.addEventListener("ended", () => { btnPP.textContent="▶ Oynat"; btnPP.classList.remove("accent"); });

function pctFromEvent(e){
  const rect = scrubWrap.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
}
function seekToPct(pct){ if(vid.duration) vid.currentTime = pct * vid.duration; }
function tooltipAtPct(pct){
  tooltip.textContent = vid.duration ? fmt(pct*vid.duration) : "—";
  tooltip.style.left  = (pct*100)+"%";
}

scrubWrap.addEventListener("mousedown",  e => { scrubDragging=true; vid.pause(); seekToPct(pctFromEvent(e)); });
scrubWrap.addEventListener("mousemove",  e => { tooltipAtPct(pctFromEvent(e)); if(scrubDragging) seekToPct(pctFromEvent(e)); });
scrubWrap.addEventListener("mouseup",    e => { if(scrubDragging){ seekToPct(pctFromEvent(e)); scrubDragging=false; } });
scrubWrap.addEventListener("mouseleave", () => { scrubDragging=false; });
scrubWrap.addEventListener("click",      e => seekToPct(pctFromEvent(e)));
scrubWrap.addEventListener("touchstart", e => { scrubDragging=true; vid.pause(); seekToPct(pctFromEvent(e)); },{passive:true});
scrubWrap.addEventListener("touchmove",  e => { if(scrubDragging) seekToPct(pctFromEvent(e)); },{passive:true});
scrubWrap.addEventListener("touchend",   () => { scrubDragging=false; });

document.addEventListener("keydown", e => {
  if (!vid.src || e.target.tagName==="TEXTAREA" || e.target.tagName==="INPUT") return;
  if (e.key==="ArrowLeft")  { e.preventDefault(); stepFrame(-1); }
  if (e.key==="ArrowRight") { e.preventDefault(); stepFrame(+1); }
  if (e.key===" ")          { e.preventDefault(); togglePlay(); }
});

function loadVideo(url){
  vsection.classList.remove("hidden");
  document.getElementById("videoPlaceholder").style.display = "none";
  vid.style.display = "block";
  if (vid.src !== url) { vid.src = url; vid.load(); }
  vid.play().catch(()=>{});
  document.getElementById("frameRow").classList.remove("visible");
}
function stopVideo(){
  vid.pause(); vid.removeAttribute("src"); vid.load();
  vid.style.display = "none";
  document.getElementById("videoPlaceholder").style.display = "flex";
  updateScrubber();
}
function togglePlay(){ vid.paused ? vid.play() : vid.pause(); }
function stepFrame(n){ vid.pause(); vid.currentTime=Math.max(0,Math.min(vid.duration||0,vid.currentTime+n*(1/30))); }
function stepSec(s)  { vid.pause(); vid.currentTime=Math.max(0,Math.min(vid.duration||0,vid.currentTime+s)); }
function gotoStart() { vid.currentTime=0; }
function gotoEnd()   { if(vid.duration) vid.currentTime=vid.duration-(1/30); }

// ── FRAME EXTRACTION ─────────────────────────────────────────────────────────
function doExtract(){
  const canvas  = document.getElementById("extractCanvas");
  canvas.width  = vid.videoWidth  || 512;
  canvas.height = vid.videoHeight || 512;
  const ctx = canvas.getContext("2d");
  try { ctx.drawImage(vid, 0, 0); }
  catch(e){ toast("Canvas çizim hatası — CORS engeli olabilir.", "error"); return; }
  const ts = vid.currentTime;
  canvas.toBlob(blob => {
    if (!blob) { toast("Frame alınamadı","error"); return; }
    extractedBlob = blob;
    if (window._prevFrameUrl) URL.revokeObjectURL(window._prevFrameUrl);
    window._prevFrameUrl = URL.createObjectURL(blob);
    document.getElementById("frameThumb").src = window._prevFrameUrl;
    document.getElementById("frameTs").textContent = "⏱ " + fmt(ts);
    document.getElementById("frameSz").textContent = "📐 " + vid.videoWidth + "×" + vid.videoHeight + "   " + (blob.size/1024).toFixed(1) + " KB";
    document.getElementById("frameRow").classList.add("visible");
    toast("Frame alındı: " + fmt(ts), "success");
  }, "image/png");
}
function extractFrame(){
  if (!vid.src || !vid.videoWidth){ toast("Video yüklü değil","error"); return; }
  vid.pause(); doExtract();
}
function extractLastFrame(){
  if (!vid.duration){ toast("Video süresi bilinmiyor","error"); return; }
  vid.pause();
  const target = Math.max(0, vid.duration-(1/30));
  vid.currentTime = target;
  vid.addEventListener("seeked", function handler(){
    vid.removeEventListener("seeked", handler);
    doExtract();
  });
}
function useExtractedFrame(){
  if (!extractedBlob){ toast("Önce bir frame alın","error"); return; }
  const file = new File([extractedBlob], "extracted_frame.png", {type:"image/png"});
  handleFile(file);
  toast("Frame görsel olarak yüklendi — prompt ekleyip başlatabilirsiniz","success");
  document.querySelector(".form-panel").scrollTop = 0;
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, type=""){
  const c = document.getElementById("toastContainer");
  const t = document.createElement("div");
  t.className = `toast ${type}`; t.textContent = msg;
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity="0"; }, 2800);
  setTimeout(()=>{ t.remove(); }, 3200);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
fetch("/api/jobs").then(r=>r.json()).then(jobs=>{
  jobs.forEach(j=>{ allJobs[j.id]=j; subscribeJob(j.id); });
  renderJobList(jobs);
});
</script>
</body>
</html>
